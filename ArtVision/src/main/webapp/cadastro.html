<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter">
    <title>Tela de Cadastro</title>
    <link rel="stylesheet" href="../../../../styles_cadastro.css">
</head>

<body onload="listar()">
    <div class="container">
        <div class="quadro1">
            <div class="texto-quadro1">
                <h1 class="titulo1">Bem-Vindo!</h1>
                <p class="titulo2">A ArtVision Tech Software</p>
            </div>
        </div>
        <div class="quadro2">
            <div class="container-quadro2">
                <h1 class="titulo">Registre-se</h1>
                <div class="formulario">
                    <div class="campos">
                        <input type="text" id="input_nome" placeholder="Nome">
                        <div id="div_nome"></div>
                    </div>
                    
                    <div class="campos">
                        <input type="text" id="input_email" placeholder="Email">
                        <div id="div_email"></div>
                    </div>
                    
                    <div class="campos">
                        <span>Empresas</span>
                        <select id="listaMuseus">
                            <option selected></option>
                        </select>
                    <div id="div_empresa"></div>

                    </div>
                    <div class="campos">
                        <input id="input_CPF" placeholder="CPF">
                        <div id="div_cpf"></div>
                    </div>
                    <div class="campos">
                        <input type="password" id="input_senha" placeholder="Senha">
                        <div id="div_senha"></div>
                    </div>
                </div>
                <button onclick="cadastrar()" class="botao">Criar conta</button>
                <div class="form-footer">

                    <b class="registro">Já possui uma conta? <a href="login.html" style="text-decoration: none;"> <span
                                style="color: #8c2a44; "><b>Login</b></span>
                        </a></b>


                </div>
            </div>
        </div>
    </div>
</body>

</html>
<script>
    function cadastrar() {
       
        var nomeVar = input_nome.value;
        var emailVar = input_email.value;
        var cpfVar = input_CPF.value;
        var senhaVar = input_senha.value;
        var museusVar = listaMuseus.value;

        div_cpf.innerHTML =""
        div_email.innerHTML =""
        div_empresa.innerHTML =""
        div_senha.innerHTML =""
        div_nome.innerHTML =""



        var nome_especial =
            nomeVar.indexOf('1') >= 0 || nomeVar.indexOf('2') >= 0 ||
            nomeVar.indexOf('3') >= 0 || nomeVar.indexOf('4') >= 0 ||
            nomeVar.indexOf('5') >= 0 || nomeVar.indexOf('7') >= 0 ||
            nomeVar.indexOf('8') >= 0 || nomeVar.indexOf('9') >= 0 ||
            nomeVar.indexOf('0') >= 0 || nomeVar.indexOf('!') >= 0 ||
            nomeVar.indexOf('@') >= 0 || nomeVar.indexOf('6') >= 0 ||
            nomeVar.indexOf('#') >= 0 || nomeVar.indexOf('%') >= 0 ||
            nomeVar.indexOf('¨') >= 0 || nomeVar.indexOf('&') >= 0 ||
            nomeVar.indexOf('*') >= 0 || nomeVar.indexOf('-') >= 0 ||
            nomeVar.indexOf('(') >= 0 || nomeVar.indexOf('_') >= 0 ||
            nomeVar.indexOf(')') >= 0 || nomeVar.indexOf('+') >= 0 ||
            nomeVar.indexOf('$') >= 0 || nomeVar.indexOf('=') >= 0 ||
            nomeVar.indexOf('ç') >= 0 || nomeVar.indexOf(',') >= 0 ||
            nomeVar.indexOf('{') >= 0 || nomeVar.indexOf(':') >= 0 ||
            nomeVar.indexOf('}') >= 0 || nomeVar.indexOf(';') >= 0 ||
            nomeVar.indexOf('[') >= 0 || nomeVar.indexOf('|') >= 0 ||
            nomeVar.indexOf('/') >= 0 || nomeVar.indexOf('º') >= 0 ||
            nomeVar.indexOf('?') >= 0 || nomeVar.indexOf('°') >= 0;


        if (nomeVar == "" || emailVar == "" || cpfVar == "" ||
            senhaVar == "" || museusVar == "") {
            alert("Não é permitido campos em branco")
        }

        if (nomeVar == "") {
            div_nome.innerHTML = 'Este campo não pode ficar vazio <br>'
        } else {

        }
        if (emailVar == "") {
            div_email.innerHTML = 'Este campo não pode ficar vazio <br>'
        } else {

        }
        if (museusVar=="") {
            div_empresa.innerHTML = 'Este campo não pode ficar vazio <br>'
        } else {
            div_nome.innerHTML += " "
        }

        if (nome_especial) {
            div_nome.innerHTML = 'O Nome deve conter apenas letras <br>'
        } else {
            div_nome.innerHTML += " "
        }
        if (cpfVar.length != 11) {
            div_cpf.innerHTML = 'Numero de CPF invalido'
        }
        else {
            div_cpf.innerHTML += " "
        }
        if (senhaVar.length < 8) {
            div_senha.innerHTML = 'A senha deve conter pelo menos oito digitos'
        } else {

        }
        }
</script>
